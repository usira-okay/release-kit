services:
  # Seq 日誌服務
  seq:
    image: datalust/seq:2024.1
    container_name: release-kit-seq
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    networks:
      - release-kit-network
    restart: unless-stopped

  # Release-Kit Console 應用程式
  release-kit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: release-kit-app
    environment:
      - ASPNETCORE_ENVIRONMENT=docker
      - FileStorage__BasePath=/data/release-kit
      - Seq__ServerUrl=http://seq:80
    networks:
      - release-kit-network
    volumes:
      - ./appsettings.docker.json:/app/appsettings.docker.json:ro
      - release-kit-data:/data/release-kit

networks:
  release-kit-network:
    driver: bridge

volumes:
  seq-data:
  release-kit-data:
